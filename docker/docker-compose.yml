name: polymarket_bot
services:
  backend:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../config:/app/config
      - ../data:/app/data
      - ../logs:/app/logs
      - ../static/dss:/app/static/dss
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend-dss:
    profiles: ["full", "dss-only"]
    image: nginx:alpine
    ports:
      - "5175:80"
    volumes:
      - ../static/dss:/usr/share/nginx/html:ro
      - ./nginx-dss.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
