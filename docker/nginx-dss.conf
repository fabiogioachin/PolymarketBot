events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # CORS headers — open for cross-origin fetch from any origin
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # HTML / JS / CSS — never cached (always fresh)
    location ~ \.(html|js|css)$ {
      add_header Cache-Control "no-store" always;
      add_header Access-Control-Allow-Origin * always;
      try_files $uri =404;
    }

    # JSON snapshot — cached 5 minutes (matches snapshot write interval)
    location ~ \.json$ {
      add_header Cache-Control "public, max-age=300" always;
      add_header Access-Control-Allow-Origin * always;
      try_files $uri =404;
    }

    # SPA fallback: unknown paths serve dss.html (DSS artifact)
    location / {
      try_files $uri $uri/ /dss.html;
    }
  }
}
