app:
  name: polymarket-bot
  version: "0.1.0"
  env: development
  log_level: INFO
  dry_run: true

polymarket:
  base_url: https://gamma-api.polymarket.com
  clob_url: https://clob.polymarket.com
  ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  rate_limit: 10  # requests per second
  retry_max: 3
  retry_backoff: 1.0

execution:
  mode: dry_run  # dry_run | shadow | live
  tick_interval_seconds: 60
  shadow_mode: false

risk:
  max_exposure_pct: 50
  max_single_position_eur: 5%
  daily_loss_limit_eur: 15%
  fixed_fraction_pct: 5
  max_positions: 25
  horizon_allocation:
    short_pct: 65    # 60% of max_exposure for trades < 3 days
    medium_pct: 25   # 30% for 3-14 days
    long_pct: 8     # 10% for 14-30 days
    super_long_pct: 2   # 2% for > 30 days (too much uncertainty)
  circuit_breaker:
    consecutive_losses: 3
    daily_drawdown_pct: 15
    cooldown_minutes: 60

valuation:
  tick_interval_seconds: 120
  weights:
    base_rate: 0.15
    rule_analysis: 0.15
    microstructure: 0.15
    cross_market: 0.10
    event_signal: 0.15
    pattern_kg: 0.10
    temporal: 0.05
    crowd_calibration: 0.05
    cross_platform: 0.10
    whale_pressure: 0.05       # Phase 13 S4b — event-style (independent prob)
    insider_pressure: 0.05     # Phase 13 S4b — microstructure-style (centered on price)
    # Nominal sum: 1.10. Effective ≈ 1.00 with manifold disabled (cross_platform=0).
    # Validator accepts [0.95, 1.15] — fair_value normalizes by effective weight_total.
  thresholds:
    min_edge: 0.05
    min_edge_short: 0.03     # short horizon: 3% edge (fast turnover compensates)
    min_edge_medium: 0.05    # medium horizon: standard 5%
    min_edge_long: 0.10      # long horizon: 10% (capital lockup cost)
    min_edge_super_long: 0.15  # super_long: 15% (very high bar, >30 days)
    min_confidence: 0.3
    strong_edge: 0.15
  volatility:
    window_minutes: 60            # trailing window for realized_volatility
    velocity_window_minutes: 30   # trailing window for price_velocity
    k_short: 0.5                  # CI multiplier per horizon
    k_medium: 0.75
    k_long: 1.0
    velocity_alpha: 0.5           # scales velocity_against into penalty
    strong_edge_threshold: 0.10   # |edge_central| above this bypasses velocity penalty
    min_observations: 3           # min price points to compute vol

intelligence:
  gdelt:
    enabled: true
    poll_interval_minutes: 60
    watchlist:
      themes:
        - ELECTION
        - ECON_INFLATION
        - WB_CONFLICT
      actors:
        - USA
        - RUS
        - CHN
        - EU
      countries:
        - US
        - RU
        - CN
        - UA
        - IL
  rss:
    enabled: true
    poll_interval_minutes: 30
    feeds:
      - name: BBC World
        url: https://feeds.bbci.co.uk/news/world/rss.xml
      - name: Al Jazeera
        url: https://www.aljazeera.com/xml/rss/all.xml
      - name: NPR News
        url: https://feeds.npr.org/1001/rss.xml
      - name: The Guardian World
        url: https://www.theguardian.com/world/rss
  obsidian:
    vault_path: "C:/Users/fgioa/OneDrive - SYNESIS CONSORTIUM/Desktop/PRO/_ObsidianKnowledge"
    patterns_path: Projects/PolymarketBot/patterns
    enabled: true
  manifold:
    enabled: false
    base_url: https://api.manifold.markets/v0
    rate_limit: 10
    poll_interval_minutes: 30
    match_confidence_threshold: 0.6
    min_manifold_volume: 1000.0
    min_unique_bettors: 10
  whale:
    enabled: true
    threshold_usd: 100000          # single trade >= $100k flagged as whale
    pre_resolution_window_minutes: 30
    tick_interval_seconds: 60
  popular_markets:
    enabled: true
    top_n: 20
    tick_interval_minutes: 5
  leaderboard:
    enabled: true
    tick_interval_minutes: 60
  subgraph:
    enabled: true
    endpoint: "https://gateway.thegraph.com/api/subgraphs/id/81Dm16JjuFSrqz813HysXoUPvzTwE7fsfPk2RTf66nyC"
    api_key_env: "THEGRAPH_API_KEY"
    rate_limit_per_minute: 100
    enrichment_ttl_hours: 1

strategies:
  enabled:
    - value_edge
    - arbitrage
    - rule_edge
    - event_driven
    - resolution
  domain_filters:
    value_edge: []      # all domains
    arbitrage: []
    rule_edge: []
    event_driven:
      - politics
      - geopolitics
      - economics
    resolution:
      - sports
      - crypto

telegram:
  enabled: false
  alert_rules:
    - type: trade_executed
      min_edge: 0.10
    - type: circuit_breaker
    - type: daily_summary

llm:
  enabled: false
  triggers:
    - anomaly
    - new_market
    - daily_digest
  max_daily_calls: 20
  model: claude-sonnet-4-6

dss:
  # Phase 13 S4a — Decision Support System live artifact.
  # SnapshotWriter writes static/dss/intelligence_snapshot.json every N minutes;
  # the standalone dss.html (S5a) polls this file. Safe to disable in live mode.
  snapshot_writer:
    enabled: true
    output_path: "static/dss/intelligence_snapshot.json"
    tick_interval_minutes: 5
